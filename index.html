<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL LIFE SUPREME : CYBER EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #11111b; --panel: #181825; --text: #cdd6f4;
            --accent: #b4befe; --money: #a6e3a1; --warn: #f38ba8;
            --study: #89b4fa; --social: #fab387; --gold: #f9e2af;
        }

        * { box-sizing: border-box; font-family: 'Press Start 2P', cursive; }
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            image-rendering: pixelated; overflow: hidden;
        }

        #game-container {
            width: 900px; height: 600px; background: var(--panel);
            border: 8px solid #000; box-shadow: 20px 20px 0 rgba(0,0,0,0.5);
            display: grid; grid-template-columns: 250px 1fr; grid-template-rows: 80px 1fr 60px;
        }

        /* --- TOP BAR --- */
        .top-bar { 
            grid-column: 1 / 3; background: #11111b; border-bottom: 6px solid #000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .clock-box { color: var(--gold); font-size: 12px; }
        .money-box { color: var(--money); font-size: 16px; text-shadow: 2px 2px #000; }

        /* --- SIDEBAR STATS --- */
        .sidebar { 
            background: #1e1e2e; border-right: 6px solid #000; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .stat-item { font-size: 8px; }
        .progress-bg { width: 100%; height: 10px; background: #000; border: 2px solid #45475a; margin-top: 5px; }
        .progress-fill { height: 100%; width: 50%; transition: width 0.3s; }

        /* --- MAIN AREA --- */
        .main-view { padding: 20px; overflow-y: auto; position: relative; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            background: #313244; border: 4px solid #000; color: #fff; padding: 10px;
            font-size: 8px; cursor: pointer; flex: 1;
        }
        .tab-btn.active { background: var(--accent); color: #000; transform: translateY(-4px); box-shadow: 0 4px 0 #000; }

        /* --- CARDS --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: #313244; border: 4px solid #000; padding: 12px; 
            display: flex; flex-direction: column; gap: 8px; transition: 0.1s;
        }
        .card:hover:not(.locked) { border-color: var(--accent); background: #45475a; }
        .card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .card-title { font-size: 9px; color: var(--accent); }
        .card-desc { font-size: 7px; line-height: 1.4; color: #a6adc8; }
        .card-price { font-size: 8px; color: var(--money); }
        .action-btn { 
            background: #585b70; border: 2px solid #000; color: #fff; padding: 5px;
            font-size: 7px; cursor: pointer; text-transform: uppercase;
        }
        .action-btn:hover:not(:disabled) { background: var(--money); color: #000; }

        /* --- CONSOLE --- */
        .console { 
            grid-column: 1 / 3; background: #000; padding: 10px 20px;
            color: var(--accent); font-size: 8px; display: flex; align-items: center;
        }

        /* ANIMATIONS */
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0); } }
        .avatar { width: 50px; height: 50px; background: var(--gold); margin: 0 auto; border: 4px solid #000; animation: float 2s infinite ease-in-out; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <div class="clock-box">🗓️ AN <span id="age">16</span> | <span id="hours">08</span>:00</div>
        <div class="money-box">$<span id="money">500</span></div>
        <div style="font-size: 8px;">🏠 <span id="home">Logement : Parents</span></div>
    </div>

    <div class="sidebar">
        <div class="avatar"></div>
        <div style="text-align: center; font-size: 8px; margin-bottom: 10px;">PROFIL : <span id="rank">Débutant</span></div>
        
        <div class="stat-item">
            ENERGIE ⚡
            <div class="progress-bg"><div id="bar-energy" class="progress-fill" style="background: var(--gold);"></div></div>
        </div>
        <div class="stat-item">
            INTELLIGENCE 🧠
            <div class="progress-bg"><div id="bar-iq" class="progress-fill" style="background: var(--study);"></div></div>
        </div>
        <div class="stat-item">
            BONHEUR ❤️
            <div class="progress-bg"><div id="bar-happy" class="progress-fill" style="background: var(--warn);"></div></div>
        </div>
        <div class="stat-item">
            SOCIAL 🤝
            <div class="progress-bg"><div id="bar-social" class="progress-fill" style="background: var(--social);"></div></div>
        </div>
        <div style="margin-top:auto; font-size: 7px; color: var(--money);">+ <span id="passive">0</span>$/an (Passif)</div>
    </div>

    <div class="main-view">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTab('work')">CARRIÈRE</button>
            <button class="tab-btn" onclick="setTab('study')">ÉTUDES</button>
            <button class="tab-btn" onclick="setTab('life')">VIE & SHOP</button>
            <button class="tab-btn" onclick="setTab('invest')">FINANCE</button>
        </div>

        <div id="content-grid" class="grid">
            </div>
    </div>

    <div class="console" id="console">> Système initialisé. Prêt pour une nouvelle vie ?</div>
</div>

<script>
    let state = {
        age: 16, hours: 8, money: 500, energy: 100, iq: 0, happy: 100, social: 20,
        passive: 0, currentTab: 'work',
        owned: [], job: 'Aucun'
    };

    const DB = {
        work: [
            { n: "Livreur Cyber-Pizza", d: "Pédale vite, les clients ont faim.", h: 4, e: 25, p: 60, req: 0 },
            { n: "QA Tester", d: "Traque les bugs dans des jeux VR.", h: 6, e: 35, p: 200, req: 50 },
            { n: "Dev Blockchain", d: "Écris du code que personne comprend.", h: 8, e: 50, p: 800, req: 300 },
            { n: "CEO MegaCorp", d: "Domine le marché mondial.", h: 10, e: 70, p: 4000, req: 1500 }
        ],
        study: [
            { n: "Tutos HoloNet", d: "Apprendre les bases du code.", h: 3, e: 20, m: 0, g: 10, req: 0 },
            { n: "Bootcamp Intensif", d: "3 mois de souffrance digitale.", h: 6, e: 45, m: 1000, g: 60, req: 80 },
            { n: "Université d'Élite", d: "Le diplôme suprême.", h: 8, e: 60, m: 8000, g: 250, req: 400 }
        ],
        life: [
            { n: "Sortie en Arcade", d: "Détente totale entre amis.", h: 3, e: 10, m: 50, s: 20, ha: 30 },
            { n: "Néo-Appartement", d: "Enfin ton propre chez-toi.", h: 0, e: 0, m: 5000, pass: 0, type: 'home' },
            { n: "Setup PC Pro", d: "Booste tes gains d'intelligence.", h: 0, e: 0, m: 2000, type: 'item' }
        ],
        invest: [
            { n: "PixelCoin", d: "Crypto volatile mais rentable.", m: 500, pass: 50 },
            { n: "Immobilier Cloud", d: "Revenus passifs stables.", m: 10000, pass: 1200 }
        ]
    };

    function setTab(t) {
        state.currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        render();
    }

    function render() {
        // Update Stats
        document.getElementById('age').innerText = state.age;
        document.getElementById('money').innerText = state.money.toLocaleString();
        document.getElementById('hours').innerText = state.hours < 10 ? '0'+state.hours : state.hours;
        document.getElementById('bar-energy').style.width = state.energy + '%';
        document.getElementById('bar-iq').style.width = Math.min(state.iq/20, 100) + '%';
        document.getElementById('bar-happy').style.width = state.happy + '%';
        document.getElementById('bar-social').style.width = state.social + '%';
        document.getElementById('passive').innerText = state.passive;

        const grid = document.getElementById('content-grid');
        grid.innerHTML = '';

        DB[state.currentTab].forEach(item => {
            const locked = item.req !== undefined && state.iq < item.req;
            const card = document.createElement('div');
            card.className = `card ${locked ? 'locked' : ''}`;
            
            card.innerHTML = `
                <div class="card-title">${item.n}</div>
                <div class="card-desc">${item.d}</div>
                <div class="card-price">${item.p ? '+'+item.p+'$' : item.m ? '-'+item.m+'$' : ''} ${item.h ? '| '+item.h+'h' : ''}</div>
                <button class="action-btn" onclick="execute('${state.currentTab}', '${item.n}')" ${locked ? 'disabled' : ''}>Sélectionner</button>
            `;
            grid.appendChild(card);
        });

        // Special Sleep Button
        if(state.hours >= 22 || state.energy < 10) {
            grid.innerHTML += `
                <div class="card" style="grid-column: 1/3; border-color: var(--gold);">
                    <div class="card-title" style="color: var(--gold);">💤 FINIR LA JOURNÉE</div>
                    <div class="card-desc">Il est tard. Dors pour récupérer ton énergie et passer au lendemain.</div>
                    <button class="action-btn" style="background: var(--gold); color: #000;" onclick="sleep()">DORMIR</button>
                </div>
            `;
        }
    }

    function execute(tab, name) {
        const item = DB[tab].find(i => i.n === name);
        
        if (state.energy < (item.e || 0) || state.money < (item.m || 0)) {
            log("Pas assez d'énergie ou d'argent !");
            return;
        }

        if(tab === 'work') {
            state.money += item.p; state.energy -= item.e; state.hours += item.h;
            log(`Job fait : ${name}. +$${item.p}`);
        } else if(tab === 'study') {
            state.money -= item.m; state.energy -= item.e; state.iq += item.g; state.hours += item.h;
            log(`Étude : ${name}. IQ augmenté !`);
        } else if(tab === 'life') {
            state.money -= item.m; state.happy += (item.ha || 0); state.social += (item.s || 0);
            if(item.type === 'home') document.getElementById('home').innerText = name;
            log(`Achat/Vie : ${name}`);
        } else if(tab === 'invest') {
            state.money -= item.m; state.passive += item.pass;
            log(`Investissement : ${name} acquis.`);
        }

        checkYear();
        render();
    }

    function sleep() {
        state.hours = 8;
        state.energy = 100;
        state.money += Math.floor(state.passive / 365); // Revenu quotidien
        log("Zzz... Tu te réveilles en pleine forme.");
        
        // Chance d'événement aléatoire
        if(Math.random() > 0.8) randomEvent();
        
        render();
    }

    function checkYear() {
        if(state.hours >= 24) {
            state.hours -= 24;
            // On pourrait ajouter un compteur de jours ici
        }
        // Pour simplifier : tous les 10 clics "Dormir", on augmente l'âge
        // Ici on va faire plus simple : on augmente l'âge tous les X actions
    }

    function randomEvent() {
        const evs = ["Héritage surprise ! +$1000", "Amende pour excès de vitesse ! -$200", "Promotion flash ! +50 IQ"];
        const e = evs[Math.floor(Math.random()*evs.length)];
        if(e.includes('+$1000')) state.money += 1000;
        if(e.includes('-$200')) state.money -= 200;
        if(e.includes('+50 IQ')) state.iq += 50;
        log("ÉVÉNEMENT : " + e);
    }

    function log(m) {
        const c = document.getElementById('console');
        c.innerText = `> ${m}`;
        // Petit effet de flash
        c.style.color = "#fff";
        setTimeout(() => c.style.color = "var(--accent)", 200);
    }

    setInterval(() => {
        // Vieillissement automatique toutes les 2 minutes pour le challenge
        state.age++;
        render();
    }, 120000);

    render();
</script>
</body>
</html>

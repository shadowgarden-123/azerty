<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE PIXEL LIFE TYCOON</title>
    <style>
        :root { 
            --gold: #f1c40f; --blue: #3498db; --green: #2ecc71; 
            --red: #e74c3c; --dark: #1a1a1a; --card: #2c3e50;
        }
        body { 
            background: var(--dark); color: #eee; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; padding: 20px;
        }
        #game-container { width: 600px; background: #34495e; border: 8px solid #000; padding: 20px; box-shadow: 15px 15px 0 #000; }
        
        /* HEADER & STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 15px; border: 4px solid #000; }
        .stat-box { font-size: 14px; font-weight: bold; }
        .bar { width: 100%; height: 12px; background: #000; border: 2px solid #555; margin-top: 5px; position: relative; }
        .fill { height: 100%; transition: width 0.3s; }

        /* TABS */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: 4px solid #000; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 12px; background: #95a5a6; }
        .tab-btn.active { background: var(--gold); transform: translateY(-3px); box-shadow: 0 3px 0 #000; }

        /* CARDS */
        .panel { display: none; height: 350px; overflow-y: auto; padding-right: 10px; }
        .panel.active { display: block; }
        .card { 
            background: var(--card); border: 4px solid #000; padding: 15px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .card:hover { background: #3e5871; }
        .card-icon { font-size: 40px; background: rgba(0,0,0,0.2); padding: 10px; border: 2px solid #000; }
        .card-content { flex: 1; }
        .card-title { font-weight: bold; color: var(--gold); font-size: 16px; display: block; }
        .card-desc { font-size: 11px; color: #bdc3c7; display: block; margin: 4px 0; }
        .card-cost { font-size: 12px; font-weight: bold; color: var(--green); }

        button.action-btn { 
            background: #ecf0f1; border: 3px solid #000; padding: 8px 12px; cursor: pointer;
            font-weight: bold; font-family: inherit; font-size: 12px;
        }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #event-log { height: 60px; background: #000; padding: 10px; font-size: 12px; color: var(--green); border: 2px solid #555; overflow: hidden; }
        .money-display { font-size: 32px; text-align: center; color: var(--green); margin: 10px 0; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="game-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; font-size: 18px;">👴 ÂGE: <span id="age">16</span> ANS</h2>
        <div id="rank" style="color: var(--gold);">RANG: CITOYEN</div>
    </div>

    <div class="money-display">$<span id="money">500</span></div>

    <div class="stats-grid">
        <div class="stat-box">⚡ ÉNERGIE
            <div class="bar"><div id="bar-energy" class="fill" style="background: var(--gold); width: 100%;"></div></div>
        </div>
        <div class="stat-box">📚 SAVOIR
            <div class="bar"><div id="bar-skill" class="fill" style="background: var(--blue); width: 0%;"></div></div>
        </div>
        <div class="stat-box">😊 BONHEUR
            <div class="bar"><div id="bar-happy" class="fill" style="background: var(--green); width: 80%;"></div></div>
        </div>
        <div class="stat-box">🏠 LOGEMENT: <span id="house-name" style="color:var(--gold)">Rue</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('study')">ÉTUDES</button>
        <button class="tab-btn" onclick="switchTab('work')">Boulot</button>
        <button class="tab-btn" onclick="switchTab('shop')">INVESTIR</button>
        <button class="tab-btn" onclick="switchTab('life')">VIVRE</button>
    </div>

    <div id="panel-study" class="panel active"></div>
    <div id="panel-work" class="panel"></div>
    <div id="panel-shop" class="panel"></div>
    <div id="panel-life" class="panel" style="text-align: center;">
        <div class="card">
            <div class="card-icon">💤</div>
            <div class="card-content">
                <span class="card-title">Dormir & Finir l'Année</span>
                <span class="card-desc">Récupère 100% d'énergie et encaisse tes revenus passifs.</span>
            </div>
            <button class="action-btn" onclick="nextYear()">DORMIR</button>
        </div>
    </div>

    <div id="event-log">> Bienvenue à Pixel City. Ta vie commence ici.</div>
</div>

<script>
    let state = {
        age: 16, money: 500, energy: 100, skill: 0, happy: 80,
        passive: 0, bonusStudy: 1, 
        currentHouse: "Carton"
    };

    const studyOptions = [
        { name: "Tutos YouTube", icon: "📱", gain: 5, e: 15, m: 0, req: 0, desc: "Apprendre les bases gratuitement." },
        { name: "Lycée Technique", icon: "🏫", gain: 20, e: 30, m: 100, req: 30, desc: "Un diplôme reconnu par l'état." },
        { name: "École de Code", icon: "💻", gain: 60, e: 40, m: 1000, req: 150, desc: "Deviens un sorcier du clavier." },
        { name: "Université Elite", icon: "🏛️", gain: 150, e: 60, m: 5000, req: 500, desc: "Pour les futurs maîtres du monde." }
    ];

    const workOptions = [
        { name: "Vendeur de Burger", icon: "🍔", pay: 50, e: 20, h: -5, req: 0, desc: "C'est dur, ça sent l'huile." },
        { name: "Livreur à Vélo", icon: "🚲", pay: 120, e: 35, h: -2, req: 40, desc: "Garde la forme et gagne du cash." },
        { name: "Streamer Débutant", icon: "🎮", pay: 300, e: 40, h: 10, req: 200, desc: "Jouer et être payé ? Le rêve." },
        { name: "Architecte Senior", icon: "📐", pay: 1200, e: 50, h: -10, req: 800, desc: "Construis le futur de la ville." },
        { name: "CEO Startup", icon: "🚀", pay: 5000, e: 70, h: -20, req: 2000, desc: "Stress maximum, salaire maximum." }
    ];

    const shopOptions = [
        { name: "Appartement T2", icon: "🏢", pass: 0, m: 10000, h: 20, desc: "Quitte enfin la rue." },
        { name: "Action Bourse", icon: "📈", pass: 200, m: 2000, h: 0, desc: "L'argent travaille pour toi." },
        { name: "Villa Luxe", icon: "🏰", pass: 0, m: 150000, h: 50, desc: "Le sommet de la réussite." }
    ];

    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active');
        event.currentTarget.classList.add('active');
        render();
    }

    function render() {
        // Render Study
        const sP = document.getElementById('panel-study');
        sP.innerHTML = studyOptions.map(o => createCard(o, 'study')).join('');
        // Render Work
        const wP = document.getElementById('panel-work');
        wP.innerHTML = workOptions.map(o => createCard(o, 'work')).join('');
        // Render Shop
        const shP = document.getElementById('panel-shop');
        shP.innerHTML = shopOptions.map(o => createCard(o, 'shop')).join('');

        // Stats UI
        document.getElementById('money').innerText = state.money;
        document.getElementById('age').innerText = state.age;
        document.getElementById('bar-energy').style.width = state.energy + "%";
        document.getElementById('bar-skill').style.width = Math.min(state.skill/25, 100) + "%";
        document.getElementById('bar-happy').style.width = state.happy + "%";
    }

    function createCard(obj, type) {
        let disabled = false;
        let costLabel = "";
        
        if (type === 'study') {
            disabled = state.energy < obj.e || state.money < obj.m || state.skill < obj.req;
            costLabel = `${obj.e}⚡ | $${obj.m}`;
        } else if (type === 'work') {
            disabled = state.energy < obj.e || state.skill < obj.req;
            costLabel = `${obj.e}⚡ | +$${obj.pay}`;
        } else {
            disabled = state.money < obj.m;
            costLabel = `$${obj.m}`;
        }

        return `
            <div class="card" style="${state.skill < obj.req && type !== 'shop' ? 'filter:grayscale(1); opacity:0.6' : ''}">
                <div class="card-icon">${obj.icon}</div>
                <div class="card-content">
                    <span class="card-title">${obj.name}</span>
                    <span class="card-desc">${obj.desc}</span>
                    <span class="card-cost">${costLabel}</span>
                </div>
                <button class="action-btn" onclick="execute('${type}', '${obj.name}')" ${disabled ? 'disabled' : ''}>CHOISIR</button>
            </div>
        `;
    }

    function execute(type, name) {
        let obj;
        if(type === 'study') {
            obj = studyOptions.find(o => o.name === name);
            state.energy -= obj.e; state.money -= obj.m; state.skill += obj.gain;
            log(`Tu as étudié ${name}. Ton cerveau fume !`);
        } else if(type === 'work') {
            obj = workOptions.find(o => o.name === name);
            state.energy -= obj.e; state.money += obj.pay; state.happy += obj.h;
            log(`Job : ${name}. Tu as gagné $${obj.pay}.`);
        } else if(type === 'shop') {
            obj = shopOptions.find(o => o.name === name);
            state.money -= obj.m; state.passive += (obj.pass || 0); state.happy += (obj.h || 0);
            if(name.includes("Appartement") || name.includes("Villa")) state.currentHouse = name;
            log(`Achat : ${name}. Félicitations !`);
        }
        checkLimits();
        render();
    }

    function nextYear() {
        state.age++;
        state.energy = 100;
        state.money += state.passive;
        log(`Bonne année ! Tu as ${state.age} ans. Revenus passifs : +$${state.passive}`);
        if(state.age > 85) { alert("Fin de vie paisible. Fortune : $" + state.money); location.reload(); }
        render();
    }

    function checkLimits() {
        state.energy = Math.max(0, state.energy);
        state.happy = Math.min(100, Math.max(0, state.happy));
        if(state.happy <= 0) { alert("Dépression totale... Game Over."); location.reload(); }
    }

    function log(msg) {
        const l = document.getElementById('event-log');
        l.innerHTML = `> ${msg}<br>` + l.innerHTML;
    }

    render();
</script>
</body>
</html>

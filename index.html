<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE LIFE SIMULATOR 3D</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { --accent: #00ff00; --bg-overlay: rgba(0, 0, 0, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; overflow: hidden; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* HUD & UI */
        .hud { position: fixed; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* TOP BAR */
        .top-bar { top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; }
        .stat-group { background: var(--bg-overlay); padding: 10px 20px; border-radius: 5px; border-left: 4px solid var(--accent); }
        .money { color: var(--accent); font-size: 24px; font-weight: bold; }

        /* LANGUAGE TOGGLE */
        .lang-switch { top: 20px; left: 20px; }
        button.ui-btn { background: #333; color: white; border: 1px solid var(--accent); padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button.ui-btn:hover { background: var(--accent); color: black; }

        /* SIDE MENU (TABLET STYLE) */
        .side-menu { right: 20px; top: 100px; width: 280px; background: var(--bg-overlay); border: 2px solid #333; padding: 15px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
        .menu-title { font-size: 14px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #444; }
        .menu-item { background: #222; margin-bottom: 8px; padding: 10px; border-radius: 5px; border: 1px solid transparent; }
        .menu-item:hover { border-color: var(--accent); }
        .menu-item h4 { font-size: 13px; }
        .menu-item p { font-size: 10px; color: #aaa; margin: 4px 0; }

        /* MINIMAP */
        .minimap { bottom: 20px; right: 20px; width: 150px; height: 150px; background: #000; border: 2px solid var(--accent); border-radius: 50%; overflow: hidden; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="hud lang-switch interactive">
        <button class="ui-btn" onclick="toggleLanguage()">FR / EN</button>
    </div>

    <div class="hud top-bar">
        <div class="stat-group">
            <span id="label-money" style="font-size: 10px;">ARGENT / MONEY</span><br>
            <span class="money">$<span id="val-money">500</span></span>
        </div>
        <div class="stat-group" style="text-align: right;">
            <span id="label-age" style="font-size: 10px;">ÂGE</span><br>
            <span id="val-age" style="font-size: 20px; font-weight: bold;">18</span>
        </div>
    </div>

    <div class="hud side-menu interactive">
        <div class="menu-title" id="title-career">Carrière / Career</div>
        <div id="job-list"></div>
        
        <div class="menu-title" id="title-study" style="margin-top:20px">Études / Study</div>
        <div id="study-list"></div>
    </div>

    <div class="hud minimap"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('PWA Ready'));
            });
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- LOGIQUE DE TRADUCTION ---
        let currentLang = 'fr';
        const i18n = {
            fr: {
                money: "ARGENT", age: "ÂGE", career: "CARRIÈRE", study: "ÉTUDES",
                jobs: [
                    { n: "Livreur", d: "Course rapide en ville", p: 50, req: 0 },
                    { n: "Développeur Jr", d: "Coder des apps 3D", p: 250, req: 100 },
                    { n: "Architecte", d: "Bâtir le futur", p: 900, req: 500 }
                ],
                studies: [
                    { n: "Cours en ligne", d: "Bases du savoir", cost: 0, g: 20 },
                    { n: "Université", d: "Diplôme supérieur", cost: 2000, g: 150 }
                ]
            },
            en: {
                money: "MONEY", age: "AGE", career: "CAREER", study: "STUDY",
                jobs: [
                    { n: "Delivery Driver", d: "Fast city courier", p: 50, req: 0 },
                    { n: "Jr Developer", d: "Code 3D apps", p: 250, req: 100 },
                    { n: "Architect", d: "Build the future", p: 900, req: 500 }
                ],
                studies: [
                    { n: "Online Courses", d: "Basic knowledge", cost: 0, g: 20 },
                    { n: "University", d: "Higher degree", cost: 2000, g: 150 }
                ]
            }
        };

        // --- ETAT DU JEU ---
        let state = { money: 500, age: 18, skill: 0 };

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('label-money').innerText = t.money;
            document.getElementById('label-age').innerText = t.age;
            document.getElementById('title-career').innerText = t.career;
            document.getElementById('title-study').innerText = t.study;
            document.getElementById('val-money').innerText = state.money;

            // Render Jobs
            const jobList = document.getElementById('job-list');
            jobList.innerHTML = t.jobs.map(j => `
                <div class="menu-item" style="opacity: ${state.skill >= j.req ? 1 : 0.5}">
                    <h4>${j.n}</h4>
                    <p>${j.d}</p>
                    <button class="ui-btn" style="width:100%" onclick="work(${j.p})" ${state.skill < j.req ? 'disabled' : ''}>$${j.p}</button>
                </div>
            `).join('');

            // Render Studies
            const studyList = document.getElementById('study-list');
            studyList.innerHTML = t.studies.map(s => `
                <div class="menu-item">
                    <h4>${s.n}</h4>
                    <p>${s.d}</p>
                    <button class="ui-btn" style="width:100%" onclick="study(${s.cost}, ${s.g})">COST: $${s.cost}</button>
                </div>
            `).join('');
        }

        function work(pay) { state.money += pay; updateUI(); }
        function study(cost, gain) { 
            if(state.money >= cost) { state.money -= cost; state.skill += gain; updateUI(); }
        }

        // --- MOTEUR 3D (SIMPLIFIÉ & AMÉLIORÉ) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x111122); // Nuit urbaine

        // Lumière
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        // Sol
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Génération de Ville
        for(let i=0; i<60; i++) {
            const h = 5 + Math.random() * 20;
            const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const box = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), mat);
            box.position.set(Math.random()*200 - 100, h/2, Math.random()*200 - 100);
            scene.add(box);
        }

        camera.position.set(30, 30, 30);
        camera.lookAt(0,0,0);

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.001; // Rotation lente de la ville
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateUI();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA CITY SIMULATOR 3D</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        /* (Le style reste identique à votre version originale) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; overflow: hidden; cursor: crosshair; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        .hud { position: fixed; z-index: 100; pointer-events: none; }
        .minimap { bottom: 20px; right: 20px; width: 200px; height: 200px; background: rgba(0,0,0,0.8); border: 3px solid #00ff00; border-radius: 50%; overflow: hidden; }
        .minimap canvas { width: 100%; height: 100%; }
        .wanted-level { top: 20px; right: 20px; display: flex; gap: 8px; }
        .star { width: 32px; height: 32px; background: #333; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); transition: all 0.3s; }
        .star.active { background: #ffd700; box-shadow: 0 0 15px #ffd700; }
        .player-stats { bottom: 20px; left: 20px; color: white; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 2px black; }
        .stat-bar { width: 150px; height: 12px; background: rgba(0,0,0,0.7); margin: 5px 0; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 0.2s; }
        .health-fill { background: linear-gradient(90deg, #ff0000, #ff4444); }
        .armor-fill { background: linear-gradient(90deg, #0088ff, #44aaff); }
        .stamina-fill { background: linear-gradient(90deg, #00ff00, #44ff44); }
        .weapon-info { bottom: 80px; right: 240px; color: white; text-align: right; text-shadow: 2px 2px 2px black; }
        .weapon-name { font-size: 18px; font-weight: bold; }
        .ammo { font-size: 24px; }
        .controls-info { top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; font-size: 12px; line-height: 1.8; }
        .mission-text { top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffd700; font-size: 28px; font-weight: bold; text-shadow: 3px 3px 3px black; text-align: center; opacity: 0; transition: opacity 0.5s; }
        .mission-text.show { opacity: 1; }
        .speedo { bottom: 30px; right: 240px; color: white; font-size: 36px; font-weight: bold; text-shadow: 2px 2px 2px black; font-family: monospace; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="hud wanted-level" id="wantedLevel">
        <div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <div class="hud controls-info">
        <strong>🎮 CONTRÔLES</strong><br>
        ⌨️ WASD / ZQSD = Déplacer<br>
        🚗 F = Monter/Descendre véhicule<br>
        🔫 CLIC GAUCHE = Tirer<br>
        🖱️ SOURIS = Caméra<br>
        ⇧ SHIFT = Courir<br>
    </div>

    <div class="hud player-stats">
        <div>❤️ SANTE</div>
        <div class="stat-bar"><div class="stat-fill health-fill" id="healthBar" style="width: 100%"></div></div>
        <div>🛡️ ARMURE</div>
        <div class="stat-bar"><div class="stat-fill armor-fill" id="armorBar" style="width: 0%"></div></div>
        <div>⚡ ENDURANCE</div>
        <div class="stat-bar"><div class="stat-fill stamina-fill" id="staminaBar" style="width: 100%"></div></div>
    </div>

    <div class="hud speedo" id="speedometer">0 KM/H</div>
    <div class="hud minimap"><canvas id="minimap" width="200" height="200"></canvas></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Le code JavaScript original continue ici...
        // Note : J'ai complété la ligne finale qui était coupée
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        // ... (reste du code THREE.js) ...

        // Initialisation simplifiée pour l'exemple
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Script d'enregistrement du Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA prête !'))
                    .catch(err => console.log('Erreur SW:', err));
            });
        }
    </script>
</body>
</html>
